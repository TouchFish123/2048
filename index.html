<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', 'Arial', sans-serif;
    background: #faf8ef;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    user-select: none;
  }
  .container { text-align: center; padding: 20px; }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  h1 {
    font-size: 64px;
    font-weight: 800;
    color: #776e65;
    line-height: 1;
  }
  .scores { display: flex; gap: 8px; }
  .score-box {
    background: #bbada0;
    color: #fff;
    padding: 6px 18px;
    border-radius: 6px;
    font-weight: 700;
    min-width: 72px;
  }
  .score-box .label { font-size: 11px; text-transform: uppercase; opacity: .8; }
  .score-box .value { font-size: 22px; line-height: 1.3; }
  .sub-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
  }
  .sub-header p { color: #776e65; font-size: 14px; }
  .btn {
    background: #8f7a66;
    color: #f9f6f2;
    border: none;
    padding: 10px 20px;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background .15s;
  }
  .btn:hover { background: #9f8b76; }
  .btn:active { background: #7a6658; }
  .grid-container {
    position: relative;
    width: 400px;
    height: 400px;
    background: #bbada0;
    border-radius: 8px;
    padding: 10px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 10px;
  }
  .cell {
    background: rgba(238, 228, 218, .35);
    border-radius: 6px;
  }
  .tile-container {
    position: absolute;
    top: 10px;
    left: 10px;
    right: 10px;
    bottom: 10px;
  }
  .tile {
    position: absolute;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: 800;
    border-radius: 6px;
    transition: top 100ms ease, left 100ms ease;
    z-index: 1;
  }
  .tile-new { animation: popIn .2s ease; }
  .tile-merged { animation: popIn .15s ease; z-index: 2; }
  @keyframes popIn {
    0% { transform: scale(0); opacity: 0; }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }
  .game-over-overlay, .win-overlay {
    position: absolute;
    inset: 0;
    background: rgba(238, 228, 218, .73);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    border-radius: 8px;
    z-index: 10;
  }
  .game-over-overlay.show, .win-overlay.show { display: flex; }
  .game-over-overlay h2, .win-overlay h2 {
    font-size: 50px;
    color: #776e65;
    margin-bottom: 15px;
  }
  .continue-btn {
    background: #8f7a66;
    color: #f9f6f2;
    border: none;
    padding: 10px 20px;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 10px;
  }
  @media (max-width: 420px) {
    .grid-container { width: 320px; height: 320px; padding: 8px; gap: 8px; }
    h1 { font-size: 44px; }
    .score-box { min-width: 60px; padding: 4px 12px; }
    .score-box .value { font-size: 18px; }
  }
  @media (max-width: 370px) {
    .grid-container { width: 280px; height: 280px; padding: 6px; gap: 6px; }
    h1 { font-size: 36px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>2048</h1>
    <div class="scores">
      <div class="score-box">
        <div class="label">Score</div>
        <div class="value" id="score">0</div>
      </div>
      <div class="score-box">
        <div class="label">Best</div>
        <div class="value" id="high-score">0</div>
      </div>
    </div>
  </div>
  <div class="sub-header">
    <p>合并数字，达到 <strong>2048</strong>！</p>
    <button class="btn" onclick="startNewGame()">新游戏</button>
  </div>
  <div class="grid-container" id="grid-container">
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="tile-container" id="tile-container"></div>
    <div class="game-over-overlay" id="game-over">
      <h2>Game Over!</h2>
      <button class="btn" onclick="startNewGame()">再来一局</button>
    </div>
    <div class="win-overlay" id="win">
      <h2>你赢了!</h2>
      <button class="btn" onclick="continueGame()">继续玩</button>
    </div>
  </div>
</div>
<script>
const SIZE = 4;
let grid, tileIds, tileMap, nextId, score, highScore, gameOver, won, animating;

// ---- Sound system (Web Audio API) ----
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  return audioCtx;
}
function playTone(freq, dur, type, vol) {
  const ctx = getAudioCtx();
  if (!ctx) return;
  if (ctx.state === 'suspended') ctx.resume();
  try {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol || 0.1, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start();
    osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}
function playMoveSound() { playTone(150, 0.06, 'sine', 0.08); }
function playMergeSound() { playTone(380, 0.12, 'sine', 0.1); }
function playWinSound() {
  [523, 659, 784, 1047].forEach((f, i) =>
    setTimeout(() => playTone(f, 0.2, 'sine', 0.1), i * 110));
}
function playGameOverSound() {
  [400, 350, 300, 200].forEach((f, i) =>
    setTimeout(() => playTone(f, 0.25, 'sine', 0.08), i * 160));
}

// ---- Color map ----
function getTileColors(val) {
  const map = {
    2:    {bg: '#eee4da',  fg: '#776e65'},
    4:    {bg: '#ede0c8',  fg: '#776e65'},
    8:    {bg: '#f2b179',  fg: '#f9f6f2'},
    16:   {bg: '#f59563',  fg: '#f9f6f2'},
    32:   {bg: '#f67c5f',  fg: '#f9f6f2'},
    64:   {bg: '#f65e3b',  fg: '#f9f6f2'},
    128:  {bg: '#edcf72',  fg: '#f9f6f2'},
    256:  {bg: '#edcc61',  fg: '#f9f6f2'},
    512:  {bg: '#edc850',  fg: '#f9f6f2'},
    1024: {bg: '#edc53f',  fg: '#f9f6f2'},
    2048: {bg: '#edc22e',  fg: '#f9f6f2'},
  };
  return map[val] || {bg: '#3c3a32', fg: '#f9f6f2'};
}

// ---- Layout helpers ----
function getTileSize() {
  const container = document.getElementById('tile-container');
  const w = container.parentElement.clientWidth - 20;
  const gap = w > 380 ? 10 : 8;
  return { size: (w - gap * 3) / 4, gap };
}

function setTilePosition(el, row, col) {
  const { size, gap } = getTileSize();
  el.style.left = col * (size + gap) + 'px';
  el.style.top = row * (size + gap) + 'px';
}

// ---- High score ----
function loadHighScore() {
  return parseInt(localStorage.getItem('2048-highscore') || '0', 10);
}
function saveHighScore(v) {
  localStorage.setItem('2048-highscore', v);
}
function updateScoreDisplay() {
  document.getElementById('score').textContent = score;
  if (score > highScore) {
    highScore = score;
    saveHighScore(highScore);
  }
  document.getElementById('high-score').textContent = highScore;
}

// ---- Tile creation ----
function createTileEl(id, value, row, col, isNew) {
  const { size, gap } = getTileSize();
  const colors = getTileColors(value);
  const el = document.createElement('div');
  el.className = 'tile' + (isNew ? ' tile-new' : '');
  el.textContent = value;
  const fontSize = value >= 10000 ? Math.round(size * 0.28) : value >= 1000 ? Math.round(size * 0.38) : Math.round(size * 0.52);
  Object.assign(el.style, {
    width: size + 'px',
    height: size + 'px',
    left: col * (size + gap) + 'px',
    top: row * (size + gap) + 'px',
    background: colors.bg,
    color: colors.fg,
    fontSize: fontSize + 'px',
    lineHeight: size + 'px',
  });
  return el;
}

// ---- Core game state ----
function getEmptyCells() {
  const empty = [];
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (!grid[r][c]) empty.push([r, c]);
  return empty;
}

function addRandomTile() {
  const empty = getEmptyCells();
  if (!empty.length) return null;
  const [r, c] = empty[Math.floor(Math.random() * empty.length)];
  const value = Math.random() < 0.9 ? 2 : 4;
  const id = nextId++;
  grid[r][c] = value;
  tileIds[r][c] = id;
  return { id, value, row: r, col: c };
}

function isGameOver() {
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++) {
      if (!grid[r][c]) return false;
      if (c + 1 < SIZE && grid[r][c] === grid[r][c+1]) return false;
      if (r + 1 < SIZE && grid[r][c] === grid[r+1][c]) return false;
    }
  return true;
}

// ---- Rendering ----
function renderAllTiles() {
  const container = document.getElementById('tile-container');
  container.innerHTML = '';
  tileMap.clear();
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++) {
      if (!grid[r][c]) continue;
      const id = tileIds[r][c];
      if (!id) continue;
      const el = createTileEl(id, grid[r][c], r, c, false);
      el.dataset.row = r;
      el.dataset.col = c;
      container.appendChild(el);
      tileMap.set(id, el);
    }
}

// ---- Move & Animation ----
function move(dr, dc) {
  if (gameOver || animating) return false;

  const newGrid = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
  const newIds   = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
  const merged   = Array.from({length: SIZE}, () => Array(SIZE).fill(false));
  const consumedIds = [];

  const rowRange = dr === 1 ? [SIZE-1, 0, -1] : [0, SIZE-1, 1];
  const colRange = dc === 1 ? [SIZE-1, 0, -1] : [0, SIZE-1, 1];
  const rS = rowRange[0], rE = rowRange[1], rSt = rowRange[2];
  const cS = colRange[0], cE = colRange[1], cSt = colRange[2];

  let moved = false;

  for (let r = rS; r !== rE + rSt; r += rSt) {
    for (let c = cS; c !== cE + cSt; c += cSt) {
      if (!grid[r][c]) continue;
      let nr = r, nc = c;
      while (true) {
        const tr = nr + dr, tc = nc + dc;
        if (tr < 0 || tr >= SIZE || tc < 0 || tc >= SIZE) break;
        if (newGrid[tr][tc]) {
          if (newGrid[tr][tc] === grid[r][c] && !merged[tr][tc]) {
            nr = tr; nc = tc;
          }
          break;
        }
        nr = tr; nc = tc;
      }
      if (nr !== r || nc !== c) moved = true;
      if (newGrid[nr][nc]) {
        newGrid[nr][nc] = grid[r][c] * 2;
        merged[nr][nc] = true;
        score += newGrid[nr][nc];
        consumedIds.push(tileIds[r][c]);
      } else {
        newGrid[nr][nc] = grid[r][c];
        newIds[nr][nc] = tileIds[r][c];
      }
    }
  }

  if (!moved) return false;
  playMoveSound();
  animating = true;

  // Phase 1 — slide existing tiles to new positions
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      const id = newIds[r][c];
      if (!id) continue;
      const el = tileMap.get(id);
      if (!el) continue;
      setTilePosition(el, r, c);
      el.dataset.row = r;
      el.dataset.col = c;
      if (merged[r][c]) {
        const val = newGrid[r][c];
        el.textContent = val;
        const colors = getTileColors(val);
        el.style.background = colors.bg;
        el.style.color = colors.fg;
        const { size: sz } = getTileSize();
        el.style.fontSize = (val >= 10000 ? Math.round(sz * 0.28) : val >= 1000 ? Math.round(sz * 0.38) : Math.round(sz * 0.52)) + 'px';
      }
    }
  }

  // Phase 2 — cleanup & new tile after transition completes
  setTimeout(() => {
    // Remove consumed tiles from DOM
    for (const id of consumedIds) {
      const el = tileMap.get(id);
      if (el) { el.remove(); tileMap.delete(id); }
    }
    // Add merge animation class
    let mergedAny = false;
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        if (merged[r][c] && newIds[r][c]) {
          const el = tileMap.get(newIds[r][c]);
          if (el) { el.className = 'tile tile-merged'; mergedAny = true; }
        }
      }
    }
    if (mergedAny) playMergeSound();

    // Commit state
    grid = newGrid;
    tileIds = newIds;
    updateScoreDisplay();

    // Win check
    if (!won) {
      for (let r = 0; r < SIZE; r++)
        for (let c = 0; c < SIZE; c++)
          if (newGrid[r][c] === 2048) {
            document.getElementById('win').classList.add('show');
            playWinSound();
            won = true;
            break;
          }
    }

    // New random tile
    const nt = addRandomTile();
    if (nt) {
      const el = createTileEl(nt.id, nt.value, nt.row, nt.col, true);
      el.dataset.row = nt.row;
      el.dataset.col = nt.col;
      document.getElementById('tile-container').appendChild(el);
      tileMap.set(nt.id, el);
    }

    updateScoreDisplay();
    animating = false;

    if (isGameOver()) {
      gameOver = true;
      document.getElementById('game-over').classList.add('show');
      playGameOverSound();
    }
  }, 120);

  return true;
}

// ---- Controls ----
function startNewGame() {
  grid = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
  tileIds = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
  tileMap = new Map();
  nextId = 1;
  score = 0;
  gameOver = false;
  won = false;
  animating = false;
  highScore = loadHighScore();
  document.getElementById('game-over').classList.remove('show');
  document.getElementById('win').classList.remove('show');
  updateScoreDisplay();
  addRandomTile();
  addRandomTile();
  renderAllTiles();
}

function continueGame() {
  document.getElementById('win').classList.remove('show');
  won = true;
}

// Keyboard
document.addEventListener('keydown', e => {
  switch (e.key) {
    case 'ArrowUp':    e.preventDefault(); move(-1, 0); break;
    case 'ArrowDown':  e.preventDefault(); move(1, 0);  break;
    case 'ArrowLeft':  e.preventDefault(); move(0, -1); break;
    case 'ArrowRight': e.preventDefault(); move(0, 1);  break;
  }
});

// Touch
let touchStartX, touchStartY;
document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive: true});
document.addEventListener('touchmove', e => e.preventDefault(), {passive: false});
document.addEventListener('touchend', e => {
  if (touchStartX === undefined) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const absDx = Math.abs(dx), absDy = Math.abs(dy);
  if (Math.max(absDx, absDy) < 30) return;
  if (absDx > absDy) move(0, dx > 0 ? 1 : -1);
  else move(dy > 0 ? 1 : -1, 0);
  touchStartX = touchStartY = undefined;
}, {passive: true});

startNewGame();
</script>
</body>
</html>
